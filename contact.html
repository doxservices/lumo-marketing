<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LUMO • Contact Us</title>
  <meta name="description" content="Contact LUMO to discuss a design, motion, video, or campaign project.">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="contact">
  <nav class="site-nav" aria-label="Primary navigation">
    <a class="nav-brand" href="index.html" aria-label="LUMO home">LUMO<span></span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="brands.html">Brands we work with</a>
      <a href="contact.html" class="active">Contact us</a>
    </div>
  </nav>

  <main class="page-spread contact-spread">
    <section class="contact-card">
      <p class="eyebrow">Start Here</p>
      <h1>Let’s Work<br>Together<span class="yellow-dot"></span></h1>
      <p class="lead">Tell us about your project and let’s bring your ideas to life.</p>
      <div class="contact-info">
        <span>Accra, Ghana</span>
        <span>+233 59 143 2316</span>
        <span>hello@lumo.studio</span>
      </div>
      <form class="contact-form" onsubmit="event.preventDefault(); this.querySelector('button').textContent='Message Ready ✓';">
        <input type="text" placeholder="Your Name" autocomplete="name" required>
        <input type="email" placeholder="Your Email" autocomplete="email" required>
        <select required>
          <option value="">Project Type</option>
          <option value="graphic">Graphic Design</option>
          <option value="motion">Motion Graphics</option>
          <option value="video">Video Production</option>
        </select>
        <textarea rows="4" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </section>
    <section class="visual-panel contact-art" aria-label="Contact visual">
      <img src="assets/contact_content.svg" alt="Camera setup for production work">
    </section>
  </main>
</body>
</html>

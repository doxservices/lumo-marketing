<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LUMO • Creative Solutions</title>
  <meta name="description" content="LUMO one-page creative studio site for design, motion graphics, videography, and video editing.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="site-nav" aria-label="Primary navigation">
    <a class="brand" href="#home" aria-label="LUMO home">
      <span class="logo-word">LUMO</span><span class="logo-sun"></span><span class="logo-line"></span>
    </a>
    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#portfolio">Portfolio</a>
      <a href="#brands">Brands we work with</a>
      <a href="#contact">Contact us</a>
    </div>
  </nav>

  <main>
    <section id="home" class="section-panel" aria-label="Creative Solutions">
      <img class="section-art" src="assets/hero.svg" alt="LUMO creative solutions with camera and laptop">
      <a class="hotspot work" href="#portfolio" aria-label="View our work"></a>
      <a class="hotspot contact" href="#contact" aria-label="Get in touch"></a>
    </section>

    <section id="portfolio" class="section-panel" aria-label="Portfolio">
      <img class="section-art" src="assets/portfolio_content.svg" alt="LUMO portfolio grid with selected projects">
      <a class="hotspot all-projects" href="#brands" aria-label="Continue to brand partners"></a>
    </section>

    <section id="brands" class="section-panel" aria-label="Brands we work with">
      <img class="section-art" src="assets/brands_content.svg" alt="LUMO brand partner logo grid">
      <a class="hotspot brands-cta" href="#contact" aria-label="Work with us"></a>
    </section>

    <section id="contact" class="section-panel" aria-label="Contact LUMO">
      <img class="section-art" src="assets/contact_content.svg" alt="LUMO contact form and camera production visual">
      <form class="real-contact-form" aria-label="Send us a message">
        <input type="text" name="name" placeholder="Your Name" autocomplete="name">
        <input type="email" name="email" placeholder="Your Email" autocomplete="email">
        <select name="project_type">
          <option value="">Project Type</option>
          <option>Graphic Design</option>
          <option>Motion Graphics</option>
          <option>Videography</option>
          <option>Video Editing</option>
        </select>
        <textarea name="message" placeholder="Your Message"></textarea>
        <button type="button">SEND MESSAGE</button>
      </form>
    </section>
  </main>
</body>
</html>
